{% extends "base.html" %}

{% block title %}Add Condition{% endblock %}

{% block content %}
<h2>Add New Condition</h2>

<form method="POST" style="max-width: 800px;">
    <div class="form-group">
        <label for="name">Name *</label>
        <input type="text" id="name" name="name" required placeholder="e.g., Depression, GAD, Anxiety">
    </div>

    <div class="form-group">
        <label for="disease_code">Code *</label>
        <input type="text" id="disease_code" name="disease_code" required placeholder="e.g., DEP, ANX, GAD" maxlength="50">
        <small style="color: #666; display: block; margin-top: 0.5rem;">
            Unique identifier for the condition (required).
        </small>
    </div>
    
    <div class="form-group">
        <label for="description">About</label>
        <textarea id="description" name="description" placeholder="Brief description of the condition"></textarea>
    </div>

    <div class="form-group">
        <label for="icd_dsm_code">ICD/DSM Code (Optional)</label>
        <input type="text" id="icd_dsm_code" name="icd_dsm_code" placeholder="e.g., F32, 296.20" maxlength="100">
        <small style="color: #666; display: block; margin-top: 0.5rem;">
            Enter diagnostic code (ICD-10, DSM-5, etc.)
        </small>
    </div>
    
    <div style="display: flex; gap: 1rem;">
        <button type="submit" class="btn">Add Condition</button>
        <a href="/diseases" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
