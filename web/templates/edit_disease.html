{% extends "base.html" %}

{% block title %}Edit Condition{% endblock %}

{% block content %}
<h2>Edit Condition</h2>

<form method="POST" style="max-width: 800px;">
    <div class="form-group">
        <label for="name">Name *</label>
        <input type="text" id="name" name="name" required value="{{ disease.name }}" 
               placeholder="e.g., Depression, GAD, Anxiety">
    </div>

    <div class="form-group">
        <label for="disease_code">Code</label>
        <input type="text" id="disease_code" name="disease_code" value="{{ disease.code or '' }}" placeholder="Auto-generates if left empty" maxlength="50">
        <small style="color: #666; display: block; margin-top: 0.5rem;">
            Unique short code for this condition. Leave empty to auto-generate.
        </small>
    </div>
    
    <div class="form-group">
        <label for="description">About</label>
        <textarea id="description" name="description" 
                  placeholder="Brief description of the condition">{{ disease.description or '' }}</textarea>
    </div>

    <div class="form-group">
        <label for="icd_dsm_code">ICD/DSM Code (Optional)</label>
        <input type="text" id="icd_dsm_code" name="icd_dsm_code" value="{{ disease.icd_dsm_code or '' }}" placeholder="e.g., F32, 296.20" maxlength="100">
        <small style="color: #666; display: block; margin-top: 0.5rem;">
            Enter diagnostic code (ICD-10, DSM-5, etc.)
        </small>
    </div>
    
    <div style="display: flex; gap: 1rem;">
        <button type="submit" class="btn">Update Condition</button>
        <a href="/diseases" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
